<!DOCTYPE html>
<html lang="ja">
<head><link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>トーク - SCHOOL LINK</title>
    <style>
        :root { --bg: #000; --accent: #0095f6; --my-msg: #0095f6; --other-msg: #262626; --border: #262626; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 45px 15px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .back { color: var(--accent); cursor: pointer; font-size: 24px; margin-right: 15px; width: 30px; text-decoration: none; }
        .target-icon { width: 35px; height: 35px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 18px; }
        .target-name { font-weight: bold; font-size: 16px; flex: 1; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--other-msg); border-bottom-left-radius: 4px; }
        .input-bar { padding: 10px 15px 30px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #121212; border: 1px solid #363636; border-radius: 20px; padding: 12px 18px; color: white; outline: none; }
        .send-btn { color: var(--accent); font-weight: bold; cursor: pointer; padding: 5px 10px; align-self: center; }
    </style>
</head>
<body>

<header>
    <div class="back" onclick="location.href='chat_list.html'">‹</div>
    <div class="target-icon" id="headIcon">👤</div>
    <div class="target-name" id="headName">チャット</div>
</header>

<div id="chatBox"></div>

<div class="input-bar">
    <input type="text" id="msgInput" placeholder="メッセージを入力..." autocomplete="off">
    <div class="send-btn" id="sendBtn">送信</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9l8I7LB-n0F3bx22_5SHwTaQu1JtZ1dk",
        authDomain: "school-link-log-in.firebaseapp.com",
        projectId: "school-link-log-in",
        storageBucket: "school-link-log-in.firebasestorage.app",
        messagingSenderId: "973480393850",
        appId: "1:973480393850:web:11aa0cb8477d928a6a8fc3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const targetId = params.get('id');
    document.getElementById('headName').innerText = params.get('name') || "チャット";
    document.getElementById('headIcon').innerText = params.get('icon') || "👤";

    let currentUser = null;
    let roomID = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            roomID = [user.uid, targetId].sort().join("_");
            loadMessages();
        } else {
            window.location.href = "login.html";
        }
    });

    function loadMessages() {
        const q = query(collection(db, "rooms", roomID, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = `msg ${d.uid === currentUser.uid ? 'me' : 'other'}`;
                div.innerText = d.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        await addDoc(collection(db, "rooms", roomID, "messages"), {
            text: input.value,
            uid: currentUser.uid,
            time: serverTimestamp()
        });
        input.value = "";
    };
</script>
</body>
</html>
