<!DOCTYPE html>
<html lang="ja">
<head><link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>予定 - SCHOOL LINK</title>
    <style>
        :root {
            --bg: #000;
            --card: #1c1c1e;
            --accent: #0a84ff;
            --text: #fff;
            --day-bg: #2c2c2e;
        }
        body {
            margin: 0;
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .back {
            background: #fff; color: #000; padding: 8px 15px;
            border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 0 15px 100px;
            box-sizing: border-box;
        }
        .calendar-card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .nav-btn {
            background: #3a3a3c; color: white; border: none;
            width: 44px; height: 44px; border-radius: 50%;
            font-size: 18px; cursor: pointer;
        }
        #monthDisplay { font-size: 18px; font-weight: bold; }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: #8e8e93;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .day-cell {
            aspect-ratio: 1 / 1.1;
            background: var(--day-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .day-cell.today { color: var(--accent); font-weight: bold; }
        .day-cell.selected { border-color: var(--accent); background: rgba(10, 132, 255, 0.1); }
        .dot {
            width: 5px; height: 5px; background: var(--accent);
            border-radius: 50%; position: absolute; bottom: 8px;
        }

        .event-section {
            margin-top: 20px;
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
        }
        input {
            width: 100%; padding: 16px; margin-bottom: 12px;
            border-radius: 14px; border: none; background: #2c2c2e;
            color: white; font-size: 16px; box-sizing: border-box;
        }
        .add-btn {
            width: 100%; padding: 16px; background: var(--accent);
            color: white; border: none; border-radius: 14px;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .event-list { margin-top: 15px; }
        .event-item {
            background: #2c2c2e; padding: 15px; border-radius: 12px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; font-size: 14px;
        }
        .del-btn { background: #ff453a; color: white; border: none; border-radius: 8px; padding: 8px 12px; }
    </style>
</head>
<body>

<header>
    <span>カレンダー</span>
    <a href="index.html" class="back">ホーム</a>
</header>

<div class="container">
    <div class="calendar-card">
        <div class="calendar-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
            <span id="monthDisplay"></span>
            <button class="nav-btn" onclick="changeMonth(1)">❯</button>
        </div>
        <div class="weekdays">
            <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <div class="event-section">
        <h3 id="selectedDateTitle" style="margin-top:0; font-size:16px;">日付を選択</h3>
        <input type="text" id="eventInput" placeholder="予定を入力">
        <button class="add-btn" onclick="addEvent()">保存する</button>
        <div id="eventList" class="event-list"></div>
    </div>
</div>

<script>
    // --- データ修復ロジック ---
    function getSafeEvents() {
        try {
            const data = localStorage.getItem("calendar_events");
            return data ? JSON.parse(data) : [];
        } catch (e) {
            console.error("データが壊れていたためリセットしました");
            return [];
        }
    }

    let viewDate = new Date();
    let selectedDateStr = new Date().toISOString().split('T')[0];
    let events = getSafeEvents();

    function render() {
        const grid = document.getElementById("calendarGrid");
        const monthDisp = document.getElementById("monthDisplay");
        if(!grid || !monthDisp) return;
        
        grid.innerHTML = "";

        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        monthDisp.innerText = `${year}年 ${month + 1}月`;

        // 月の最初の日と最後の日を正確に取得
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];

        // 空白作成
        for (let i = 0; i < firstDay; i++) {
            grid.innerHTML += `<div></div>`;
        }

        // 日付作成
        for (let i = 1; i <= lastDate; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const isToday = dateStr === todayStr;
            const isSelected = dateStr === selectedDateStr;
            const hasEvent = events.some(e => e.date === dateStr);

            const cell = document.createElement("div");
            cell.className = `day-cell ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}`;
            cell.innerHTML = `<span>${i}</span>${hasEvent ? '<div class="dot"></div>' : ''}`;
            cell.onclick = (e) => {
                e.stopPropagation();
                selectDate(dateStr);
            };
            grid.appendChild(cell);
        }
        updateEventList();
    }

    function selectDate(date) {
        selectedDateStr = date;
        document.getElementById("selectedDateTitle").innerText = date.split('-').join('/') + " の予定";
        render();
    }

    function changeMonth(diff) {
        viewDate.setMonth(viewDate.getMonth() + diff);
        render();
    }

    function addEvent() {
        const input = document.getElementById("eventInput");
        if (!input.value.trim()) return;
        
        events.push({ 
            id: Date.now(), // 削除しやすくするためにID付与
            text: input.value, 
            date: selectedDateStr 
        });
        localStorage.setItem("calendar_events", JSON.stringify(events));
        input.value = "";
        render();
    }

    function deleteEvent(id) {
        events = events.filter(e => e.id !== id);
        localStorage.setItem("calendar_events", JSON.stringify(events));
        render();
    }

    function updateEventList() {
        const list = document.getElementById("eventList");
        list.innerHTML = "";
        const todayEvents = events.filter(e => e.date === selectedDateStr);
        
        if(todayEvents.length === 0) {
            list.innerHTML = `<p style="font-size:12px; color:#8e8e93; text-align:center;">予定はありません</p>`;
            return;
        }

        todayEvents.forEach((e) => {
            const item = document.createElement("div");
            item.className = "event-item";
            item.innerHTML = `<span>${e.text}</span><button class="del-btn" onclick="deleteEvent(${e.id})">削除</button>`;
            list.appendChild(item);
        });
    }

    // 起動
    document.addEventListener("DOMContentLoaded", () => {
        selectDate(selectedDateStr);
    });
</script>
</body>
</html>
