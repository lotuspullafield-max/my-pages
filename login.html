<!DOCTYPE html>
<html lang="ja">
<head><link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - SCHOOL LINK</title>
    <style>
        :root { --bg: #000; --accent: #0095f6; --input: #121212; --border: #363636; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { width: 90%; max-width: 350px; text-align: center; }
        h1 { font-weight: bold; margin-bottom: 30px; font-size: 28px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: var(--input); border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-link { margin-top: 25px; font-size: 14px; color: #a8a8a8; }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .phone-link { margin-top: 15px; display: block; font-size: 12px; color: #8e8e93; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>SCHOOL LINK</h1>
    <input type="email" id="email" placeholder="メールアドレス">
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
    
    <div class="footer-link">
        アカウントをお持ちでないですか？ <a href="signup.html">登録する</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9l8I7LB-n0F3bx22_5SHwTaQu1JtZ1dk",
        authDomain: "school-link-log-in.firebaseapp.com",
        projectId: "school-link-log-in",
        storageBucket: "school-link-log-in.firebasestorage.app",
        messagingSenderId: "973480393850",
        appId: "1:973480393850:web:11aa0cb8477d928a6a8fc3",
        measurementId: "G-VP8QFPM61Z"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            window.location.href = "index.html"; 
        } catch (e) { alert("ログインに失敗しました。メアドやパスワードを確認してください。"); }
    };
</script>
</body>
</html>
