<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIアシスタント - SCHOOL LINK</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 50px 20px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2c2c2e; flex-shrink: 0; }
        .back { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 20px; }
        #chatContainer { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; color: #eee; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; color: #fff; }
        .input-area { padding: 20px; background: #111; display: flex; gap: 10px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); flex-shrink: 0; }
        input { flex: 1; background: #2c2c2e; border: none; padding: 14px; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        button { background: var(--accent); border: none; color: #fff; padding: 0 20px; border-radius: 12px; font-weight: bold; }
        .loading { font-size: 12px; color: #8e8e93; margin: 0 20px 5px; display: none; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back">✕</a>
        <h2 style="margin:0; font-size:18px;">AIアシスタント</h2>
    </header>

    <div id="chatContainer">
        <div class="msg ai">こんにちは　何かお手伝いできることはありますか？</div>
    </div>
    <div id="loading" class="loading">AIが考え中...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="メッセージを入力..." autocomplete="off">
        <button id="sendBtn">送信</button>
    </div>

    <script type="module">
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const loading = document.getElementById('loading');

        // 最新のAPIキーをセット済み
        const API_KEY = "AIzaSyAf0S5fqrh3-aX0IRBwJj2bQ0q_-Mrwco0";

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'ai'}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function askAI(prompt) {
            loading.style.display = 'block';
            
            // 【重要】エラー回避のため、モデル名を gemini-pro (旧安定版) に変更しました
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt + "。あなたは学生をサポートするAIです。100文字以内で明るく答えて。" }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    addMessage("エラーが発生しました。時間を置いて試してね。", false);
                    console.error(data.error.message);
                    loading.style.display = 'none';
                    return;
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                loading.style.display = 'none';
                addMessage(aiResponse, false);

            } catch (error) {
                loading.style.display = 'none';
                addMessage("通信エラー。ネットを確認してみて！", false);
            }
        }

        sendBtn.onclick = () => {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = "";
            askAI(text);
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>
</body>
</html>
