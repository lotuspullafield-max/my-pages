<!DOCTYPE html>
<html lang="ja">
<head><link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Todo</title>
    <style>
        body { margin:0; background:#000; color:white; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; }
        header { display:flex; justify-content:space-between; align-items:center; padding:20px; width:100%; max-width:600px; box-sizing:border-box; }
        .back { background:white; color:black; padding:8px 15px; border-radius:12px; cursor:pointer; font-weight:bold; }
        .container { width:100%; max-width:600px; padding:15px; box-sizing:border-box; }
        .card { background:#1c1c1e; padding:20px; border-radius:24px; }
        input { padding:14px; border-radius:12px; border:none; margin-bottom:10px; width:100%; box-sizing:border-box; font-size:16px; background:#2c2c2e; color:white; }
        .add-btn { padding:14px; border:none; border-radius:12px; background:#0a84ff; color:white; width:100%; font-weight:bold; font-size:16px; margin-bottom:20px; }
        ul { padding:0; list-style:none; }
        li { background:#2c2c2e; margin-bottom:10px; padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; }
        .task-info { display:flex; align-items:center; gap:12px; }
        input[type="checkbox"] { width:20px; height:20px; margin:0; }
        .del-btn { background:#ff453a; color:white; border:none; padding:8px 12px; border-radius:8px; font-size:12px; }
    </style>
</head>
<body>
<header><span>Todoリスト</span><div class="back" onclick="location.href='index.html'">ホーム</div></header>
<div class="container">
    <div class="card">
        <input id="task" placeholder="何をする？">
        <input id="date" type="date">
        <button class="add-btn" onclick="addTask()">追加する</button>
        <ul id="list"></ul>
    </div>
</div>
<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function render(){
    const list = document.getElementById("list");
    list.innerHTML = "";
    tasks.forEach((t, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
            <div class="task-info">
                <input type="checkbox" ${t.done?'checked':''} onclick="toggle(${i})">
                <span style="${t.done?'text-decoration:line-through; opacity:0.5':''}">${t.text}</span>
            </div>
            <button class="del-btn" onclick="del(${i})">削除</button>
        `;
        list.appendChild(li);
    });
}

function addTask(){
    const text = document.getElementById("task").value;
    const date = document.getElementById("date").value;
    if(!text) return;
    tasks.push({ text, date: date || "期限なし", done: false });
    localStorage.setItem("tasks", JSON.stringify(tasks));
    document.getElementById("task").value = "";
    render();
}

function toggle(i){ tasks[i].done = !tasks[i].done; localStorage.setItem("tasks", JSON.stringify(tasks)); render(); }
function del(i){ tasks.splice(i,1); localStorage.setItem("tasks", JSON.stringify(tasks)); render(); }
render();
</script>
</body>
</html>
