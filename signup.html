<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新規登録 - SCHOOL LINK</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: var(--card); padding: 40px 30px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #2c2c2e; }
        input { width: 100%; padding: 16px; margin-bottom: 20px; border-radius: 14px; border: 1px solid #333; background: #2c2c2e; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        #msg { font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>SCHOOL LINK</h2>
        <p style="color:#8e8e93; font-size:14px; margin-bottom:25px;">メールアドレスを入力してください</p>
        <input type="email" id="email" placeholder="mail@example.com" inputmode="email">
        <button id="sendBtn">認証メールを送信</button>
        <div id="msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9l8I7LB-n0F3bx22_5SHwTaQu1JtZ1dk",
            authDomain: "school-link-log-in.firebaseapp.com",
            projectId: "school-link-log-in",
            storageBucket: "school-link-log-in.firebasestorage.app",
            messagingSenderId: "973480393850",
            appId: "1:973480393850:web:11aa0cb8477d928a6a8fc3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('sendBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            if(!email) return;

            const actionCodeSettings = {
                url: window.location.origin + '/complete_signup.html',
                handleCodeInApp: true,
            };

            try {
                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                window.localStorage.setItem('emailForSignIn', email);
                document.getElementById('msg').innerHTML = "<span style='color:#32d74b'>メールを送りました！<br>Safariで確認してください。</span>";
            } catch (error) {
                document.getElementById('msg').innerText = "エラー: " + error.message;
                document.getElementById('msg').style.color = "#ff453a";
            }
        };
    </script>
</body>
</html>
