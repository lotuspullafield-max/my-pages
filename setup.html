<!DOCTYPE html>
<html lang="ja">
<head><link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>設定 - SCHOOL LINK</title>
    <style>
        :root { --bg: #000; --accent: #0095f6; --card: #1c1c1e; --input: #121212; --border: #363636; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { width: 90%; max-width: 380px; text-align: center; }
        .selected-display { width: 80px; height: 80px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; border: 2px solid var(--accent); }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: var(--card); padding: 10px; border-radius: 15px; height: 140px; overflow-y: auto; margin-bottom: 20px; border: 1px solid var(--border); }
        .emoji-item { font-size: 20px; padding: 8px; cursor: pointer; border-radius: 8px; }
        .emoji-item.active { background: var(--accent); }
        input { width: 100%; padding: 14px; margin-bottom: 10px; background: var(--input); border: 1px solid var(--border); color: white; border-radius: 12px; box-sizing: border-box; outline: none; text-align: center; }
        button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
<div class="card">
    <div class="selected-display" id="mainIcon">👤</div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <input type="text" id="userName" placeholder="名前を入力" maxlength="15" oninput="checkInput()">
    <button id="nextBtn" onclick="saveProfile()" disabled>設定を完了する</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9l8I7LB-n0F3bx22_5SHwTaQu1JtZ1dk",
        authDomain: "school-link-log-in.firebaseapp.com",
        projectId: "school-link-log-in",
        storageBucket: "school-link-log-in.firebasestorage.app",
        messagingSenderId: "973480393850",
        appId: "1:973480393850:web:11aa0cb8477d928a6a8fc3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const emojis = ['👤','😊','😎','🐱','🐶','⚽','🎮','🎨','📚','🔥','✨','🚀','🏫'];
    let selectedEmoji = '👤';

    const grid = document.getElementById('emojiGrid');
    emojis.forEach(emoji => {
        const div = document.createElement('div');
        div.className = 'emoji-item';
        div.innerText = emoji;
        div.onclick = () => {
            selectedEmoji = emoji;
            document.getElementById('mainIcon').innerText = emoji;
            document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('active'));
            div.classList.add('active');
        };
        grid.appendChild(div);
    });

    window.checkInput = () => {
        const name = document.getElementById('userName').value;
        document.getElementById('nextBtn').disabled = name.trim().length === 0;
    };

    window.saveProfile = async () => {
        const name = document.getElementById('userName').value.trim();
        const user = auth.currentUser;
        if (user) {
            try {
                // ここでawaitして確実に保存を待つ！
                await updateProfile(user, { displayName: name, photoURL: selectedEmoji });
                // 保存が終わったことを確認してから移動
                window.location.replace("role.html"); 
            } catch (e) { alert("エラー: " + e.message); }
        } else {
            alert("ログインを確認できませんでした。");
        }
    };
</script>
</body>
</html>
