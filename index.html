<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCHOOL LINK</title>
    <style>
        :root {
            --bg: #000;
            --card: #1c1c1e;
            --accent: #0a84ff;
            --text: #fff;
            --sub: #8e8e93;
            --notice: #ff9500;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px 20px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            font-weight: 800;
        }
        
        /* ログアウトができるようにクリック可能に設定 */
        .user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #2c2c2e;
            cursor: pointer; 
        }
        .user-chip:active { opacity: 0.7; }
        .user-icon { font-size: 18px; }
        .user-name { font-size: 13px; font-weight: 600; }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 0 15px;
            box-sizing: border-box;
        }

        /* 連絡エリア */
        .announcement-card {
            background: var(--card);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            border-left: 4px solid var(--notice);
        }
        .announcement-title {
            font-size: 13px;
            color: var(--notice);
            font-weight: bold;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .announcement-body {
            font-size: 15px;
            line-height: 1.5;
            color: #eee;
        }
        .announcement-date {
            font-size: 10px;
            color: var(--sub);
            margin-top: 8px;
            text-align: right;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .menu-item {
            background: var(--card);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
        }
        .menu-item:active { transform: scale(0.95); background: #2c2c2e; }
        .icon { font-size: 28px; margin-bottom: 8px; }
        .label { font-size: 11px; font-weight: 600; color: var(--sub); }

        /* 黄色い枠（not-linked）を削除しました */

        .summary-card {
            background: linear-gradient(145deg, #1c1c1e, #111);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2c2c2e;
        }
        .summary-card h2 {
            margin: 0 0 15px;
            font-size: 16px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-list { margin: 0; padding: 0; list-style: none; }
        .info-item {
            padding: 12px 0;
            border-bottom: 1px solid #2c2c2e;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <header>
        <h1>SCHOOL LINK</h1>
        <div class="user-chip" id="userBtn">
            <span id="myIcon" class="user-icon">👤</span>
            <span id="myName" class="user-name">...</span>
        </div>
    </header>

    <div class="container">
        <div id="announcementArea" style="display: none;">
            <div class="announcement-card">
                <div class="announcement-title">📢 先生からの最新連絡</div>
                <div class="announcement-body" id="newsText">...</div>
                <div class="announcement-date" id="newsDate">--/--</div>
            </div>
        </div>

        <div class="menu-grid">
            <a href="study.html" class="menu-item"><span class="icon">📖</span><span class="label">勉強</span></a>
            <a href="calender.html" class="menu-item"><span class="icon">🗓️</span><span class="label">予定</span></a>
            <a href="todo.html" class="menu-item"><span class="icon">✅</span><span class="label">Todo</span></a>
            <a href="ai.html" class="menu-item"><span class="icon">🤖</span><span class="label">AI</span></a>
            <a href="chat_list.html" class="menu-item"><span class="icon">💬</span><span class="label">トーク</span></a>
            <a href="renraku.html" class="menu-item" id="renrakuBtn"><span class="icon">✉️</span><span class="label">連絡</span></a>
        </div>

        <div class="summary-card">
            <h2>✨ AI Navigation</h2>
            <div id="aiContent" class="info-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9l8I7LB-n0F3bx22_5SHwTaQu1JtZ1dk",
            authDomain: "school-link-log-in.firebaseapp.com",
            projectId: "school-link-log-in",
            storageBucket: "school-link-log-in.firebasestorage.app",
            messagingSenderId: "973480393850",
            appId: "1:973480393850:web:11aa0cb8477d928a6a8fc3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const role = localStorage.getItem('user_role');
                if (role === 'school') {
                    window.location.replace("school_home.html");
                    return;
                }
                document.getElementById('myName').innerText = user.displayName || "ゲスト";
                updateHome();
                loadLatestAnnouncement();
            } else {
                window.location.href = "login.html";
            }
        });

        // 🆕 ログアウト処理を追加
        document.getElementById('userBtn').onclick = () => {
            if (confirm("ログアウトしますか？")) {
                signOut(auth).then(() => {
                    localStorage.clear();
                    window.location.href = "login.html";
                });
            }
        };

        function loadLatestAnnouncement() {
            const area = document.getElementById('announcementArea');
            const q = query(collection(db, "announcements"), orderBy("createdAt", "desc"), limit(1));
            onSnapshot(q, (snapshot) => {
                if (!snapshot.empty) {
                    area.style.display = "block";
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        document.getElementById('newsText').innerText = data.content;
                        if(data.createdAt) {
                            const d = data.createdAt.toDate();
                            document.getElementById('newsDate').innerText = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
                        }
                    });
                }
            });
        }

        function updateHome() {
            const aiContent = document.getElementById('aiContent');
            const today = new Date().toISOString().split('T')[0];
            const studies = JSON.parse(localStorage.getItem('studies')) || [];
            const todayMin = Math.floor((studies.filter(s => s.date === today).reduce((total, s) => total + (s.totalSec || 0), 0)) / 60);

            aiContent.innerHTML = `
                <div class="info-item"><span>今日の勉強時間</span><span style="color: #32d74b; font-weight: bold;">${todayMin}分</span></div>
                <div class="info-item"><span>未読メッセージ</span><span style="color: #ff3b30;">-- 件</span></div>
            `;
        }
    </script>
</body>
</html>
