<!DOCTYPE html>
<html lang="ja">
<head><link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>トーク - SCHOOL LINK</title>
    <style>
        :root { --bg: #000; --my-bubble: #32d74b; --other-bubble: #2c2c2e; --accent: #0a84ff; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { display: flex; align-items: center; padding: 15px; background: #1c1c1e; border-bottom: 1px solid #333; }
        .back { background: #fff; color: #000; padding: 6px 12px; border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: bold; }
        #chatContainer { flex: 1; overflow-y: auto; padding: 20px 10px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; position: relative; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--my-bubble); color: #000; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--other-bubble); color: white; border-bottom-left-radius: 4px; }
        .input-area { background: #1c1c1e; padding: 10px 15px 30px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #2c2c2e; border: none; border-radius: 20px; padding: 12px 18px; color: white; font-size: 16px; outline: none; }
        .send-btn { background: var(--accent); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back">←</a>
    <span style="margin-left:15px; font-weight:bold;">トーク</span>
</header>

<div id="chatContainer"></div>

<div class="input-area">
    <input type="text" id="chatInput" placeholder="メッセージを入力...">
    <button class="send-btn" onclick="sendMessage()">▲</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // あなたの Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyAJglaCyLxkzbLECSECcJfcwDuv_Mlgwgc",
    authDomain: "school-link-52c2d.firebaseapp.com",
    projectId: "school-link-52c2d",
    storageBucket: "school-link-52c2d.firebasestorage.app",
    messagingSenderId: "663356878039",
    appId: "1:663356878039:web:550709a53f096ae3bbd492",
    measurementId: "G-7X13YRRKSW"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "messages");

  // ユーザーIDの設定
  let myId = localStorage.getItem('chat_user_id') || 'user_' + Math.random().toString(36).substring(2, 9);
  localStorage.setItem('chat_user_id', myId);

  // 送信機能
  window.sendMessage = async () => {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    try {
      await addDoc(colRef, {
        text: text,
        sender: myId,
        createdAt: serverTimestamp()
      });
      input.value = "";
    } catch (e) {
      console.error(e);
      alert("送信エラー！Firebaseの「Rules（ルール）」がテストモードになっているか確認してね。");
    }
  };

  // 受信機能（リアルタイム）
  const q = query(colRef, orderBy("createdAt", "asc"));
  onSnapshot(q, (snapshot) => {
    const container = document.getElementById('chatContainer');
    container.innerHTML = "";
    snapshot.forEach((doc) => {
      const data = doc.data();
      if (!data.text) return;
      const isMe = data.sender === myId;
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${isMe ? 'me' : 'other'}`;
      msgDiv.innerText = data.text;
      container.appendChild(msgDiv);
    });
    container.scrollTop = container.scrollHeight;
  });

  document.getElementById('chatInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
