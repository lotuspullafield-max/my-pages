<!DOCTYPE html>
<html lang="ja">
<head><link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学習タイマー - SCHOOL LINK</title>
<style>
:root { --bg: #000; --card: #1c1c1e; --accent: #32d74b; --main-blue: #0a84ff; --text: #fff; --sub: #8e8e93; }
body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system, sans-serif; display:flex; flex-direction:column; align-items:center; }
header { display:flex; justify-content:space-between; align-items:center; padding:20px; width:100%; max-width:500px; box-sizing:border-box; }
.back { background:#fff; color:#000; padding:8px 15px; border-radius:12px; cursor:pointer; font-weight:bold; font-size:14px; text-decoration:none; }

.container { width:100%; max-width:500px; padding:0 15px 100px; box-sizing:border-box; }
.card { background:var(--card); padding:20px; border-radius:24px; margin-bottom:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5); }

/* ストップウォッチ表示 */
.timer-container { text-align: center; padding: 10px 0; }
#display { font-size: 70px; font-weight: 800; font-variant-numeric: tabular-nums; margin: 10px 0; letter-spacing: -2px; }
.status-label { color: var(--accent); font-size: 12px; font-weight: bold; letter-spacing: 2px; }

.controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
.main-btn { width: 80px; height: 80px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
.main-btn:active { transform: scale(0.9); }
.btn-start { background: var(--accent); color: white; }
.btn-pause { background: #ff9f0a; color: white; }
.btn-reset { background: #3a3a3c; color: white; }

/* 記録エリア */
.input-area { border-top: 1px solid #333; padding-top: 20px; }
.input-row { display: flex; gap: 10px; margin-bottom: 10px; }
input { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #2c2c2e; color: white; font-size: 16px; box-sizing: border-box; }
.save-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--main-blue); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

/* カレンダー */
.calendar-title { margin: 10px 0; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.day-cell { background: #2c2c2e; aspect-ratio: 1/1.3; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; }
.day-cell.today { border: 1.5px solid var(--main-blue); }
.study-time-tag { font-size: 8px; color: var(--main-blue); font-weight: bold; margin-top: 2px; text-align: center; line-height: 1.1; }
.has-study { background: rgba(10, 132, 255, 0.1); }

/* 履歴 */
.history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2c2c2e; font-size: 13px; }
</style>
</head>
<body>

<header>
    <span>学習記録</span>
    <a href="index.html" class="back">ホーム</a>
</header>

<div class="container">
    <div class="card">
        <div class="timer-container">
            <div class="status-label" id="statusLabel">STOPWATCH</div>
            <div id="display">00:00:00</div>
        </div>
        <div class="controls">
            <button class="main-btn btn-reset" onclick="resetTimer()">リセット</button>
            <button class="main-btn btn-start" id="startBtn" onclick="toggleTimer()">開始</button>
        </div>
        <div class="input-area">
            <input id="subject" placeholder="教科名（例：英語）" style="margin-bottom: 10px;">
            <div class="input-row">
                <input id="minInput" type="number" placeholder="分">
                <input id="secInput" type="number" placeholder="秒">
            </div>
            <button class="save-btn" onclick="saveRecord()">この時間を記録する</button>
        </div>
    </div>

    <div class="card">
        <div class="calendar-title">
            <span>学習カレンダー</span>
            <span id="monthName" style="color: var(--sub); font-size: 14px;"></span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px; font-size:15px;">今日の履歴</h3>
        <div id="history"></div>
    </div>
</div>

<script>
let totalSeconds = 0;
let timer = null;
let isRunning = false;
let studies = JSON.parse(localStorage.getItem("studies")) || [];

// 秒単位のフォーマット修正 (HH:MM:SS)
function updateDisplay() {
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    
    // 表示を更新
    document.getElementById('display').innerText = 
        `${h > 0 ? String(h).padStart(2,'0')+':' : ''}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    
    // 入力欄に自動反映
    document.getElementById('minInput').value = Math.floor(totalSeconds / 60);
    document.getElementById('secInput').value = totalSeconds % 60;
}

function toggleTimer() {
    const btn = document.getElementById('startBtn');
    if (isRunning) {
        clearInterval(timer);
        btn.innerText = "再開";
        btn.className = "main-btn btn-start";
        document.getElementById('statusLabel').innerText = "PAUSED";
    } else {
        timer = setInterval(() => {
            totalSeconds++;
            updateDisplay();
        }, 1000);
        btn.innerText = "停止";
        btn.className = "main-btn btn-pause";
        document.getElementById('statusLabel').innerText = "STUDYING...";
    }
    isRunning = !isRunning;
}

function resetTimer() {
    clearInterval(timer);
    isRunning = false;
    totalSeconds = 0;
    updateDisplay();
    document.getElementById('minInput').value = "";
    document.getElementById('secInput').value = "";
    document.getElementById('startBtn').innerText = "開始";
    document.getElementById('startBtn').className = "main-btn btn-start";
}

function saveRecord() {
    const sub = document.getElementById('subject').value || "無題";
    const m = parseInt(document.getElementById('minInput').value) || 0;
    const s = parseInt(document.getElementById('secInput').value) || 0;
    const total = (m * 60) + s;

    if(total <= 0) return alert("時間を入力してね！");

    studies.push({
        subject: sub,
        totalSec: total, // 秒で保存
        date: new Date().toISOString().split('T')[0]
    });
    localStorage.setItem("studies", JSON.stringify(studies));
    
    document.getElementById('subject').value = "";
    resetTimer();
    renderAll();
}

function renderAll() {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    
    // 履歴
    const history = document.getElementById('history');
    history.innerHTML = "";
    studies.filter(s => s.date === today).reverse().forEach(s => {
        const m = Math.floor(s.totalSec / 60);
        const sec = s.totalSec % 60;
        history.innerHTML += `<div class="history-item"><span>${s.subject}</span><span>${m}分${sec}秒</span></div>`;
    });

    // カレンダー修正
    const grid = document.getElementById('calendarGrid');
    const monthName = document.getElementById('monthName');
    grid.innerHTML = "";
    
    const year = now.getFullYear();
    const month = now.getMonth();
    monthName.innerText = `${year}年${month+1}月`;

    // その月の1日が何曜日か (0:日, 1:月...)
    const firstDayIndex = new Date(year, month, 1).getDay();
    // その月が何日まであるか
    const lastDate = new Date(year, month + 1, 0).getDate();

    // 日ごとの合計秒数を集計
    let dailyData = {};
    studies.forEach(s => {
        dailyData[s.date] = (dailyData[s.date] || 0) + s.totalSec;
    });

    // 前月の空白
    for(let i=0; i<firstDayIndex; i++) grid.innerHTML += `<div></div>`;

    // 日付描画
    for(let d=1; d<=lastDate; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const sec = dailyData[dateStr] || 0;
        const isToday = dateStr === today ? 'today' : '';
        
        let timeLabel = "";
        if(sec > 0) {
            const displayMin = Math.floor(sec / 60);
            const displaySec = sec % 60;
            timeLabel = `<span class="study-time-tag">${displayMin}m<br>${displaySec}s</span>`;
        }

        grid.innerHTML += `
            <div class="day-cell ${isToday} ${sec > 0 ? 'has-study' : ''}">
                <span>${d}</span>
                ${timeLabel}
            </div>`;
    }
}

renderAll();
</script>
</body>
</html>
