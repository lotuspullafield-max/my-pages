<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>勉強</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  font-size:20px;
}

.back {
  background:white;
  color:black;
  padding:5px 12px;
  border-radius:10px;
  cursor:pointer;
}

.container {
  padding:20px;
}

.card {
  background:white;
  color:black;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

input {
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
  width:100%;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4a90e2;
  color:white;
  cursor:pointer;
  width:100%;
}

/* カレンダー */
.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:5px;
  margin-top:10px;
}

.day {
  background:#eee;
  color:black;
  text-align:center;
  padding:10px 0;
  border-radius:8px;
}

.study-day {
  background:#4a90e2;
  color:white;
}

.today {
  border:2px solid red;
}
</style>
</head>

<body>

<header>
勉強
<div class="back" onclick="location.href='index.html'">← ホーム</div>
</header>

<div class="container">

<div class="card">
<input id="subject" placeholder="教科（英語など）">
<input id="time" type="number" placeholder="時間（分）">
<button onclick="addStudy()">記録</button>
</div>

<div class="card">
<h3>今日の合計：<span id="total">0</span>分</h3>
<h3>AIおすすめ：<span id="ai"></span></h3>
<ul id="list"></ul>
</div>

<div class="card">
<h3>勉強カレンダー</h3>
<div class="calendar" id="calendar"></div>
</div>

</div>

<script>
let studies = JSON.parse(localStorage.getItem("studies")) || [];

function todayStr(){
  return new Date().toISOString().split("T")[0];
}

// 表示
function render(){
  const list = document.getElementById("list");
  const totalEl = document.getElementById("total");

  list.innerHTML = "";
  let total = 0;

  let subjectTime = {};

  studies.forEach(s => {
    if(s.date === todayStr()){
      total += Number(s.time);

      subjectTime[s.subject] = (subjectTime[s.subject] || 0) + Number(s.time);

      const li = document.createElement("li");
      li.textContent = s.subject + "：" + s.time + "分";
      list.appendChild(li);
    }
  });

  totalEl.textContent = total;

  // AI（少ない教科優先）
  let weakest = Object.entries(subjectTime).sort((a,b)=>a[1]-b[1])[0];
  document.getElementById("ai").textContent = weakest ? weakest[0] : "まず1つやろう";

  renderCalendar();
}

// カレンダー生成
function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();

  let studyDates = studies.map(s => s.date);

  // 空白
  for(let i=0;i<firstDay;i++){
    const div = document.createElement("div");
    cal.appendChild(div);
  }

  for(let d=1; d<=lastDate; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const div = document.createElement("div");
    div.className = "day";
    div.textContent = d;

    if(studyDates.includes(dateStr)){
      div.classList.add("study-day");
    }

    if(dateStr === todayStr()){
      div.classList.add("today");
    }

    cal.appendChild(div);
  }
}

// 追加
function addStudy(){
  const subject = document.getElementById("subject").value;
  const time = document.getElementById("time").value;

  if(!subject || !time) return;

  studies.push({
    subject,
    time,
    date: todayStr()
  });

  localStorage.setItem("studies", JSON.stringify(studies));

  document.getElementById("subject").value="";
  document.getElementById("time").value="";

  render();
}

render();
</script>

</body>
</html>
