<!DOCTYPE html>
<html lang="ja">
<head><link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCHOOL LINK">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>トーク一覧 - SCHOOL LINK</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --border: #2c2c2e; --sub: #8e8e93; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; }
        header { padding: 50px 20px 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; }
        .header-top { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; }
        .back-home { color: var(--accent); cursor: pointer; font-size: 14px; font-weight: bold; }
        .header-title { font-size: 24px; font-weight: bold; }
        .header-sub { font-size: 12px; color: var(--sub); }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .chat-item:active { background: #1a1a1a; }
        .icon-circle { width: 50px; height: 50px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; border: 1px solid #444; }
        .info { flex: 1; }
        .name-row { display: flex; justify-content: space-between; align-items: center; }
        .name { font-weight: bold; font-size: 16px; }
        .role-badge { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 4px; color: #ccc; }
        .empty-msg { text-align: center; padding: 40px; color: var(--sub); font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="back-home" onclick="goHome()">〈 ホーム</div>
        <div class="header-title">トーク</div>
    </div>
    <div class="header-sub">メッセージを送る相手を選択</div>
</header>

<div id="userList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9l8I7LB-n0F3bx22_5SHwTaQu1JtZ1dk",
        authDomain: "school-link-log-in.firebaseapp.com",
        projectId: "school-link-log-in",
        storageBucket: "school-link-log-in.firebasestorage.app",
        messagingSenderId: "973480393850",
        appId: "1:973480393850:web:11aa0cb8477d928a6a8fc3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.goHome = () => {
        const role = localStorage.getItem('user_role');
        window.location.href = (role === 'school') ? "school_home.html" : "index.html";
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loadAllUsers(user.uid);
        } else {
            window.location.href = "login.html";
        }
    });

    async function loadAllUsers(myUid) {
        const userListEl = document.getElementById('userList');
        // 全ユーザーを取得
        const querySnapshot = await getDocs(collection(db, "users"));
        
        let html = "";
        let count = 0;

        querySnapshot.forEach((doc) => {
            const userData = doc.data();
            // 自分自身はリストに出さない
            if (doc.id !== myUid) {
                const roleLabel = (userData.role === 'school') ? '先生' : '生徒';
                html += `
                    <div class="chat-item" onclick="openChat('${doc.id}', '${userData.name}', '${userData.icon || '👤'}')">
                        <div class="icon-circle">${userData.icon || '👤'}</div>
                        <div class="info">
                            <div class="name-row">
                                <span class="name">${userData.name}</span>
                                <span class="role-badge">${roleLabel}</span>
                            </div>
                        </div>
                    </div>`;
                count++;
            }
        });

        if (count === 0) {
            html = '<div class="empty-msg">まだ他のユーザーがいません</div>';
        }
        userListEl.innerHTML = html;
    }

    window.openChat = (id, name, icon) => {
        window.location.href = `chat_room.html?id=${id}&name=${encodeURIComponent(name)}&icon=${encodeURIComponent(icon)}`;
    };
</script>
</body>
</html>
